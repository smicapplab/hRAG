# hRAG Litestream Configuration
# Automates SQLite replication to Garage S3 for stateless persistence.

access-key-id: ${S3_ACCESS_KEY}
secret-access-key: ${S3_SECRET_KEY}

dbs:
  - path: ./local.db
    replicas:
      - type: s3
        bucket: hrag-metadata
        endpoint: ${S3_ENDPOINT}
        force-path-style: true
        region: us-east-1 # Default for Garage S3
